name: Build & Push Docker Image

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/5sport-client
  API_URL_DEV: https://dapi-sport.5solution.vn
  API_URL_PROD: https://api.5sport.vn

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      ENV_SUFFIX: ${{ github.ref_name == 'main' && 'latest' || 'dev' }}
      API_URL: ${{ github.ref_name == 'main' && 'https://api.5sport.vn' || 'https://dapi-sport.5solution.vn' }}

    steps:
      - name: Debug context
        run: |
          echo "ref_name  : ${{ github.ref_name }}"
          echo "ENV_SUFFIX: ${{ env.ENV_SUFFIX }}"
          echo "API_URL   : ${{ env.API_URL }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.ENV_SUFFIX }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
